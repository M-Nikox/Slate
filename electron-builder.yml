appId: com.mnikox.slate
productName: Slate
artifactName: slate-${version}-${os}-${arch}.${ext}

asar: true

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json
  - README*
  - LICENSE*

extraMetadata:
  main: out/main/index.js

extraResources:
  - from: build/icon.png
    to: icons/icon.png

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: zip
      arch: [x64]

mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  artifactName: slate-${version}-win-${arch}-setup.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico