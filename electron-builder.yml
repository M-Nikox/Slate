appId: com.mnikox.slate
productName: Slate
artifactName: slate-${version}-${os}-${arch}.${ext}
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: zip
      arch: [x64]
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
nsis:
  artifactName: slate-${version}-windows-x64-setup.exe
